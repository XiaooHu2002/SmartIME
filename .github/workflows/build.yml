name: Build SmartIME

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-vscode:
    name: Build VS Code Extension
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: npm ci

      - name: Build IME worker
        run: npm run build:ime-worker

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          npx @vscode/vsce package --baseContentUrl https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/ --baseImagesUrl https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/ --out .\dist\smartime-${{ github.ref_name }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartime-vsix
          path: dist/*.vsix

  build-jetbrains:
    name: Build JetBrains Adapter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build JetBrains plugin
        run: gradle -p jetbrains-adapter buildPlugin --stacktrace

      - name: Upload JetBrains artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartime-jetbrains
          path: jetbrains-adapter/build/distributions/*.zip

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    needs:
      - build-vscode
      - build-jetbrains
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: smartime-vsix
          path: release-assets/vsix

      - name: Download JetBrains artifact
        uses: actions/download-artifact@v4
        with:
          name: smartime-jetbrains
          path: release-assets/jetbrains

      - name: Build release notes from CHANGELOG
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            awk -v tag="$TAG" '
              $0 ~ "^##[[:space:]]+" tag "[[:space:]]*$" { in_section=1; next }
              in_section && $0 ~ "^##[[:space:]]+" { exit }
              in_section { print }
            ' CHANGELOG.md > RELEASE_NOTES.md

            if [ ! -s RELEASE_NOTES.md ]; then
              echo "Release $TAG" > RELEASE_NOTES.md
              echo >> RELEASE_NOTES.md
              echo "See CHANGELOG.md for details." >> RELEASE_NOTES.md
            fi
          else
            echo "Automated main build release for commit ${GITHUB_SHA}." > RELEASE_NOTES.md
            echo >> RELEASE_NOTES.md
            echo "This is a pre-release generated after both VSIX and JetBrains artifacts built successfully." >> RELEASE_NOTES.md
          fi

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=main-build-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "release_name=main-build-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          files: |
            release-assets/vsix/*.vsix
            release-assets/jetbrains/*.zip
          fail_on_unmatched_files: true
