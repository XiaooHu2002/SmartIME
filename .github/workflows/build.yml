name: Build SmartIME

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

# 全局权限（兜底）
permissions:
  contents: write

jobs:
  build-vscode:
    name: Build VS Code Extension
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: npm ci

      - name: Build IME worker
        run: npm run build:ime-worker

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          npx @vscode/vsce package `
            --baseContentUrl https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/ `
            --baseImagesUrl https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/ `
            --out .\dist\smartime-${{ github.ref_name }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartime-vsix
          path: dist/*.vsix

  build-jetbrains:
    name: Build JetBrains Adapter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build JetBrains plugin
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG="${TAG#v}"
          TAG="${TAG#V}"
          gradle -p jetbrains-adapter --no-daemon -PpluginVersion="$TAG" buildPlugin --stacktrace

      - name: Upload JetBrains artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartime-jetbrains
          path: jetbrains-adapter/build/distributions/*.zip

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-vscode
      - build-jetbrains
    runs-on: ubuntu-latest

    # ❗关键：必须单独声明权限
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: smartime-vsix
          path: release-assets/vsix

      - name: Download JetBrains artifact
        uses: actions/download-artifact@v4
        with:
          name: smartime-jetbrains
          path: release-assets/jetbrains

      - name: Build release notes
        run: |
          echo "Release ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Auto generated release." >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          # 👉 推荐：如果你配置了 PAT，就用这一行
          # GITHUB_TOKEN: ${{ secrets.SMARTIME_TOKEN }}

          # 👉 默认：用系统 token
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            release-assets/vsix/*.vsix
            release-assets/jetbrains/*.zip
          fail_on_unmatched_files: true