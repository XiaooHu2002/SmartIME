name: Build SmartIME

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 根级别权限（兜底）
permissions:
  contents: write

jobs:
  build-vscode:
    name: Build VS Code Extension
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: npm ci

      - name: Build IME worker
        run: npm run build:ime-worker

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        shell: pwsh
        run: |
          $BaseUrl = "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/"
          $OutFile = "./dist/smartime-${{ github.ref_name }}.vsix"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          npx @vscode/vsce package --baseContentUrl "$BaseUrl" --baseImagesUrl "$BaseUrl" --out "$OutFile"
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartime-vsix
          path: dist/*.vsix

  build-jetbrains:
    name: Build JetBrains Adapter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build IME worker for JetBrains package
        shell: bash
        run: |
          set -e
          export GOOS=windows
          export GOARCH=amd64
          export CGO_ENABLED=0
          go build -C tools/ime-worker -o ../ime-worker.exe .

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build JetBrains plugin
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG="${TAG#v}"
          TAG="${TAG#V}"
          gradle -p jetbrains-adapter --no-daemon -PpluginVersion="$TAG" buildPlugin --stacktrace

      - name: Verify JetBrains package contains worker
        shell: bash
        run: |
          set -e
          ZIP_PATH=$(ls -1 jetbrains-adapter/build/distributions/*.zip | head -n 1)
          echo "Checking: $ZIP_PATH"
          CHECK_DIR=$(mktemp -d)
          unzip -q "$ZIP_PATH" -d "$CHECK_DIR"

          MAIN_JAR=$(find "$CHECK_DIR" -type f -name "instrumented-smartime-jetbrains-adapter-*.jar" | head -n 1)
          if [ -z "$MAIN_JAR" ]; then
            MAIN_JAR=$(find "$CHECK_DIR" -type f -name "smartime-jetbrains-adapter-*.jar" ! -name "searchableOptions-*.jar" | head -n 1)
          fi

          if [ -z "$MAIN_JAR" ]; then
            echo "ERROR: main plugin jar not found in package" >&2
            exit 1
          fi

          echo "Inspecting jar: $MAIN_JAR"
          jar tf "$MAIN_JAR" | grep -q "^bin/ime-worker\.exe$"
          echo "OK: bin/ime-worker.exe exists in plugin jar"
      - name: Upload JetBrains artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartime-jetbrains
          path: jetbrains-adapter/build/distributions/*.zip

  release:
    name: Publish GitHub Release
    # 仅在tag推送且两个构建job成功时执行（移除非tag场景的Release逻辑）
    if: startsWith(github.ref, 'refs/tags/') && needs.build-vscode.result == 'success' && needs.build-jetbrains.result == 'success'
    needs:
      - build-vscode
      - build-jetbrains
    runs-on: ubuntu-latest
    # 显式为release job声明权限（关键修复）
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # 拉取完整历史，确保能读取CHANGELOG.md
        with:
          fetch-depth: 0

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: smartime-vsix
          path: release-assets/vsix

      - name: Download JetBrains artifact
        uses: actions/download-artifact@v4
        with:
          name: smartime-jetbrains
          path: release-assets/jetbrains

      - name: Build release notes from CHANGELOG
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          CHANGELOG_VER="${TAG#v}"
          CHANGELOG_VER="${CHANGELOG_VER#V}"

          awk -v ver="$CHANGELOG_VER" '
            BEGIN {
              in_section = 0
              gsub(/[][(){}.^$*+?|\\]/, "\\\\&", ver)
            }
            $0 ~ ("^##[[:space:]]*\\[?v?" ver "\\]?([[:space:]]*$|[[:space:]-])") {
              in_section = 1
              next
            }
            in_section && $0 ~ /^##[[:space:]]+/ { exit }
            in_section { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "ERROR: no changelog section matched tag '$TAG' (normalized: '$CHANGELOG_VER')" >&2
            exit 1
          fi

      - name: Validate release PAT
        shell: bash
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "ERROR: secrets.RELEASE_PAT is empty or not configured" >&2
            exit 1
          fi

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          prerelease: false
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          files: |
            release-assets/vsix/*.vsix
            release-assets/jetbrains/*.zip
          fail_on_unmatched_files: true