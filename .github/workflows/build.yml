name: Build SmartIME

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

# 根级别权限（兜底）
permissions:
  contents: write

jobs:
  build-vscode:
    name: Build VS Code Extension
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: npm ci

      - name: Build IME worker
        run: npm run build:ime-worker

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          npx @vscode/vsce package --baseContentUrl https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/ --baseImagesUrl https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/ --out .\dist\smartime-${{ github.ref_name }}.vsix
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartime-vsix
          path: dist/*.vsix

  build-jetbrains:
    name: Build JetBrains Adapter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build JetBrains plugin
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG="${TAG#v}"
          TAG="${TAG#V}"
          gradle -p jetbrains-adapter -PpluginVersion="$TAG" buildPlugin --stacktrace
      - name: Upload JetBrains artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartime-jetbrains
          path: jetbrains-adapter/build/distributions/*.zip

  release:
    name: Publish GitHub Release
    # 仅在tag推送且两个构建job成功时执行（移除非tag场景的Release逻辑）
    if: startsWith(github.ref, 'refs/tags/') && needs.build-vscode.result == 'success' && needs.build-jetbrains.result == 'success'
    needs:
      - build-vscode
      - build-jetbrains
    runs-on: ubuntu-latest
    # 显式为release job声明权限（关键修复）
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # 拉取完整历史，确保能读取CHANGELOG.md
        with:
          fetch-depth: 0

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: smartime-vsix
          path: release-assets/vsix

      - name: Download JetBrains artifact
        uses: actions/download-artifact@v4
        with:
          name: smartime-jetbrains
          path: release-assets/jetbrains

      - name: Build release notes from CHANGELOG
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          CHANGELOG_VER="${TAG#v}"
          CHANGELOG_VER="${CHANGELOG_VER#V}"
          # 优化awk逻辑，兼容CHANGELOG的常见格式
          awk -v ver="$CHANGELOG_VER" '
            BEGIN { in_section = 0 }
            # 匹配 ## [x.y.z] 或 ## vx.y.z 格式
            $0 ~ "^##[[:space:]]*\\[?v?" ver "\\]?([[:space:]]|$)" {
              in_section = 1
              next
            }
            # 遇到下一个版本标题时退出
            in_section && $0 ~ "^##[[:space:]]+\\[?v?[0-9]+\\.[0-9]+\\.[0-9]+\\]?" { exit }
            in_section { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # 兜底：如果没找到对应版本的日志，使用默认内容
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "## Release $TAG" > RELEASE_NOTES.md
            echo -e "\nAutomated release for tag $TAG." >> RELEASE_NOTES.md
          fi

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          # 显式指定GITHUB_TOKEN（确保权限传递）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          prerelease: false
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          files: |
            release-assets/vsix/*.vsix
            release-assets/jetbrains/*.zip
          fail_on_unmatched_files: true
