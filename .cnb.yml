$:
  tag_push:
    - name: Build VSIX And Release
      stages:
        - name: Build Go IME Worker
          image: golang:1.22
          script: |
            set -e
            export GOOS=windows
            export GOARCH=amd64
            export CGO_ENABLED=0
            go build -C tools/ime-worker -o ../ime-worker.exe .

        - name: Build VSIX
          image: node:20
          script: |
            set -e
            npm ci
            npm run compile
            npm install -g @vscode/vsce

            mkdir -p dist

            TAG="${CNB_BRANCH}"
            TAG="${TAG#refs/tags/}"
            if [ -z "$TAG" ]; then
              TAG="$(node -p "require('./package.json').version")"
            fi
            CHANGELOG_VER="$TAG"
            CHANGELOG_VER="${CHANGELOG_VER#v}"
            CHANGELOG_VER="${CHANGELOG_VER#V}"

            BASE_URL="https://cnb.cool/${CNB_REPO_SLUG}"
            vsce package \
              --baseContentUrl "${BASE_URL}/-/blob/${TAG}" \
              --baseImagesUrl "${BASE_URL}/-/raw/${TAG}" \
              --out "dist/smartime-${TAG}.vsix"

            awk -v ver="$CHANGELOG_VER" '
              BEGIN {
                in_section = 0
                gsub(/[][(){}.^$*+?|\\]/, "\\\\&", ver)
              }
              $0 ~ ("^##[[:space:]]*\\[?v?" ver "\\]?([[:space:]]*$|[[:space:]-])") {
                in_section = 1
                print
                next
              }
              in_section && $0 ~ /^##[[:space:]]+/ { exit }
              in_section { print }
            ' CHANGELOG.md > RELEASE_NOTES.md

            if [ ! -s RELEASE_NOTES.md ]; then
              echo "ERROR: no changelog section matched tag '$TAG' (normalized: '$CHANGELOG_VER')" >&2
              exit 1
            fi

        - name: Build JetBrains Plugin
          image: gradle:8.10.2-jdk17
          script: |
            set -e
            gradle -p jetbrains-adapter --no-daemon buildPlugin
            mkdir -p dist
            cp jetbrains-adapter/build/distributions/*.zip dist/

        - name: Create Release
          type: git:release
          options:
            title: "${CNB_BRANCH}"
            descriptionFromFile: RELEASE_NOTES.md
            latest: true

        - name: Upload VSIX To Release
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - "./dist/*.vsix"
              - "./dist/*.zip"
